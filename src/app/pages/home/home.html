<section
  id="home"
  class="relative min-h-screen flex items-center justify-center bg-cream pt-28 pb-16 md:pt-36"
>
  <!-- Depth background layer -->
  <div class="absolute inset-0 -z-10">
    <div
      class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_20%_30%,rgba(255,111,97,0.08),transparent_40%)]"
    ></div>
    <div
      class="absolute bottom-0 right-0 w-full h-full bg-[radial-gradient(circle_at_80%_70%,rgba(0,128,128,0.08),transparent_40%)]"
    ></div>
  </div>
  <div class="container-section grid md:grid-cols-2 gap-12 lg:gap-16 items-center">
    <!-- Left: Text Content -->
    <div class="space-y-8 md:space-y-10 text-center md:text-left order-1 md:order-1">
      <div class="space-y-4" reveal>
        <p class="eyebrow font-semibold">UI/UX Designer</p>
        <h1 class="h1 text-navy leading-[1.1] tracking-tight reveal">Hi, I'm Bảo Châu</h1>
        <p class="h2 text-2xl md:text-3xl font-medium text-navy/70 leading-relaxed reveal">
          Where technical logic meets creative design.
        </p>
      </div>

      <!-- 👉 AVATAR (chỉ hiện mobile) -->
      <div class="flex justify-center reveal md:hidden">
        <div
          class="relative w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.15)] border border-white/40 transition-all duration-500 hover:scale-105 hover:shadow-[0_30px_80px_rgba(0,0,0,0.25)]"
        >
          <img
            src="/assets/images/profile/avatar.png"
            alt="Huỳnh Ngọc Bảo Châu - UI/UX Designer"
            class="w-full h-full object-cover transition-transform duration-700 ease-out hover:scale-110"
          />
          <!-- Optional: subtle overlay shape -->
          <div
            class="absolute inset-0 bg-gradient-to-tr from-coral/10 to-teal/10 pointer-events-none"
          ></div>
        </div>

        <!-- Decorative elements (optional, coastal vibe) -->
        <div
          class="absolute -bottom-8 -right-8 w-40 h-40 bg-coral/30 rounded-full blur-[120px]"
        ></div>
        <div class="absolute -top-12 -left-12 w-52 h-52 bg-teal/20 rounded-full blur-[140px]"></div>
      </div>

      <p
        class="text-lg md:text-xl text-text-muted max-w-2xl mx-auto md:mx-0 leading-relaxed reveal"
      >
        With a background in frontend, I bridge design and development - creating
        practical, responsive, and build-ready solutions.
      </p>

      <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start pt-4 reveal">
        <a
          routerLink="/"
          fragment="projects"
          class="btn btn-primary text-base px-8 py-3 whitespace-nowrap hover:-translate-y-1 hover:shadow-xl transition-all duration-300"
        >
          Explore My Projects
        </a>
        <a
          routerLink="/"
          fragment="contact"
          class="btn btn-secondary text-base px-8 py-3 whitespace-nowrap hover:-translate-y-1 hover:shadow-lg transition-all duration-300"
        >
          Let's Chat
        </a>
      </div>
    </div>

    <!-- Right: Visual / Profile -->
    <div class="relative flex justify-center hidden md:flex reveal order-2 md:order-2">
      <div
        class="relative w-64 h-64 md:w-80 md:h-80 rounded-full overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.15)] border border-white/40 transition-all duration-500 hover:scale-105 hover:shadow-[0_30px_80px_rgba(0,0,0,0.25)]"
      >
        <img
          src="/assets/images/profile/avatar.png"
          alt="Huỳnh Ngọc Bảo Châu - UI/UX Designer"
          class="w-full h-full object-cover transition-transform duration-700 ease-out hover:scale-110"
        />
        <!-- Optional: subtle overlay shape -->
        <div
          class="absolute inset-0 bg-gradient-to-tr from-coral/10 to-teal/10 pointer-events-none"
        ></div>
      </div>

      <!-- Decorative elements (optional, coastal vibe) -->
      <div
        class="absolute -bottom-8 -right-8 w-40 h-40 bg-coral/30 rounded-full blur-[120px]"
      ></div>
      <div class="absolute -top-12 -left-12 w-52 h-52 bg-teal/20 rounded-full blur-[140px]"></div>
    </div>
  </div>
</section>

<app-about></app-about>
<app-projects></app-projects>
<app-skills></app-skills>
<app-contact></app-contact>
