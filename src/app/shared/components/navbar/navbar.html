<header
  class="fixed top-0 inset-x-0 z-50 transition-all duration-300"
  [class.bg-white/80]="scrolled()"
  [class.backdrop-blur-md]="scrolled()"
  [class.border-b]="scrolled()"
  [class.border-border]="scrolled()"
  [class.shadow-sm]="scrolled()"
>
  <div class="container-portfolio flex items-center justify-between h-16">
    <!-- Logo -->
    <a
      routerLink="/"
      class="flex items-center gap-2 font-display text-lg font-medium text-stone-900 no-underline hover:text-accent transition-colors"
      (click)="open.set(false)"
    >
      YourName
      <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-8">
      <a
        routerLink="/"
        routerLinkActive="text-stone-900 font-medium"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-sm text-stone-500 hover:text-stone-900 transition-colors no-underline relative group"
      >
        Work
        <span
          class="absolute -bottom-0.5 left-0 w-0 h-px bg-accent group-hover:w-full transition-all duration-300"
        ></span>
      </a>
      <a
        routerLink="/about"
        routerLinkActive="text-stone-900 font-medium"
        class="text-sm text-stone-500 hover:text-stone-900 transition-colors no-underline relative group"
      >
        About
        <span
          class="absolute -bottom-0.5 left-0 w-0 h-px bg-accent group-hover:w-full transition-all duration-300"
        ></span>
      </a>
      <a
        href="assets/resume.pdf"
        target="_blank"
        rel="noopener"
        class="btn-ghost text-sm py-2 px-4"
      >
        Résumé ↗
      </a>
    </nav>

    <!-- Mobile hamburger -->
    <button
      class="md:hidden flex flex-col gap-1.5 p-2 cursor-pointer bg-transparent border-none"
      (click)="open.update(v => !v)"
      [attr.aria-label]="open() ? 'Close menu' : 'Open menu'"
    >
      <span
        class="block w-5 h-px bg-stone-700 transition-all duration-200"
        [class.rotate-45]="open()"
        [class.translate-y-2]="open()"
      ></span>
      <span
        class="block w-5 h-px bg-stone-700 transition-all duration-200"
        [class.opacity-0]="open()"
      ></span>
      <span
        class="block w-5 h-px bg-stone-700 transition-all duration-200"
        [class.-rotate-45]="open()"
        [class.-translate-y-2]="open()"
      ></span>
    </button>
  </div>

  <!-- Mobile menu -->
  @if (open()) {
    <div
      class="md:hidden absolute inset-x-0 top-16 bg-white border-b border-border px-6 py-6 flex flex-col gap-5 animate-[fadeInDown_200ms_ease-out]"
    >
      <a
        routerLink="/"
        (click)="open.set(false)"
        class="text-base font-medium text-stone-800 no-underline"
      >
        Work
      </a>

      <a
        routerLink="/about"
        (click)="open.set(false)"
        class="text-base font-medium text-stone-800 no-underline"
      >
        About
      </a>

      <a href="assets/resume.pdf" target="_blank" class="btn-primary self-start">
        Download résumé
      </a>
    </div>
  }
</header>
